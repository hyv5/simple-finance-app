name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run lint
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript check
        run: npx tsc --noEmit

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create react-native-kline-view CI stub
        run: |
          mkdir -p ci-stubs/react-native-kline-view
          cat > ci-stubs/react-native-kline-view/package.json << 'EOF'
          {"name":"react-native-kline-view","version":"0.0.0-ci-stub","main":"index.js","types":"index.d.ts"}
          EOF
          cat > ci-stubs/react-native-kline-view/index.js << 'EOF'
          import React from "react";
          import { View, Text, StyleSheet } from "react-native";

          export const KLineView = ({ optionList, style }) => {
            return (
              <View style={[styles.container, style]}>
                <Text style={styles.text}>KLineView: CI stub (native module not available)</Text>
              </View>
            );
          };

          const styles = StyleSheet.create({
            container: {
              flex: 1,
              justifyContent: "center",
              alignItems: "center",
              backgroundColor: "#f0f0f0",
            },
            text: {
              fontSize: 14,
              color: "#666",
              textAlign: "center",
            },
          });

          export default KLineView;
          EOF
          cat > ci-stubs/react-native-kline-view/index.d.ts << 'EOF'
          import { Component } from "react";
          import { ViewStyle } from "react-native";

          export interface KLineViewProps {
            optionList?: string;
            style?: ViewStyle;
          }

          export declare class KLineView extends Component<KLineViewProps> {}
          export default KLineView;
          EOF

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Setup Keystore
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > android/app/keystore/release-key.jks

      - name: Create signing config
        run: |
          cat > android/app/signing.properties << 'SIGNEOF'
          MYAPP_RELEASE_STORE_FILE=keystore/release-key.jks
          MYAPP_RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}
          MYAPP_RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          MYAPP_RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}
          SIGNEOF

      - name: Build APK (release)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease -PsigningConfigFile=../app/signing.properties

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

      # Tag release (e.g., v1.0.0)
      - name: Upload to GitHub Release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Every push to main: update "latest" release
      - name: Upload to Latest Release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "📱 Latest Build"
          body: "Latest signed release APK from main branch.\n\nCommit: ${{ github.sha }}\nDate: ${{ github.event.head_commit.timestamp }}"
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
